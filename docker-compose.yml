services:
  chatgpt-mirror:
    image: lisa666520/chatgpt-mirror-django:frontend
    expose:
      - "50003"
    volumes:
      - ./data:/app/data
      - ./gateway/static:/app/static:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - HOST=0.0.0.0
      - PORT=50003
      - HTTP_PROXY=${CHATGPT_OUTBOUND_PROXY-http://host.docker.internal:1081}
      - HTTPS_PROXY=${CHATGPT_OUTBOUND_PROXY-http://host.docker.internal:1081}
      - http_proxy=${CHATGPT_OUTBOUND_PROXY-http://host.docker.internal:1081}
      - https_proxy=${CHATGPT_OUTBOUND_PROXY-http://host.docker.internal:1081}
      - NO_PROXY=localhost,127.0.0.1,::1,django,chatgpt-mirror,cfbypass
      - no_proxy=localhost,127.0.0.1,::1,django,chatgpt-mirror,cfbypass
      - DATABASE_PATH=/app/data/chatgpt_mirror.db
      - ADMIN_USERNAME=${ADMIN_USERNAME:-admin}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:?ADMIN_PASSWORD must be set}
      - GATEWAY_ADMIN_SECRET=${GATEWAY_ADMIN_SECRET:?GATEWAY_ADMIN_SECRET must be set}
      - COOKIE_SECURE=${COOKIE_SECURE:-false}
      - MIRROR_API_PREFIX=${MIRROR_API_PREFIX:-}
      - ALLOW_REGISTER=${ALLOW_REGISTER:-false}
      - FREE_ACCOUNT_USERNAME=${FREE_ACCOUNT_USERNAME:-free_account}
      - ADMIN_UPSTREAM=${ADMIN_UPSTREAM:-}
      - DJANGO_UPSTREAM=http://django:8000
      - CHATGPT_BASE_URL=${CHATGPT_BASE_URL:-https://chatgpt.com}
      - CHATGPT_CDN_BASE_URL=${CHATGPT_CDN_BASE_URL:-https://cdn.oaistatic.com}
      - CHATGPT_AB_BASE_URL=${CHATGPT_AB_BASE_URL:-https://ab.chatgpt.com}
      - CF_BYPASS_URL=http://cfbypass:8000
      - REQUEST_TIMEOUT_SECS=${REQUEST_TIMEOUT_SECS:-600}
      - RUST_LOG=${RUST_LOG:-info}
    depends_on:
      - django
      - cfbypass
    restart: unless-stopped
    networks:
      - chatgpt-network

  edge-proxy:
    build:
      context: ./edge-proxy
    ports:
      - "${PORT:-50002}:50002"
    environment:
      - UPSTREAM=http://chatgpt-mirror:50003
      - LISTEN_HOST=0.0.0.0
      - LISTEN_PORT=50002
      - CLIENT_MAX_SIZE=${EDGE_CLIENT_MAX_SIZE:-536870912}
    depends_on:
      - chatgpt-mirror
    restart: unless-stopped
    networks:
      - chatgpt-network

  django:
    image: lisa666520/chatgpt-mirror-django:backend
    ports:
      - "127.0.0.1:18000:8000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - DJANGO_ENV=PRODUCTION
      - DJANGO_DEBUG=${DJANGO_DEBUG:-false}
      - DJANGO_SECRET_KEY=${DJANGO_SECRET_KEY:?DJANGO_SECRET_KEY must be set}
      - DJANGO_ALLOWED_HOSTS=${DJANGO_ALLOWED_HOSTS:-django,localhost,127.0.0.1,167.254.240.189,167.254.240.189.sslip.io}
      - DJANGO_CSRF_TRUSTED_ORIGINS=${DJANGO_CSRF_TRUSTED_ORIGINS:-http://167.254.240.189:50002,https://167.254.240.189.sslip.io}
      - DJANGO_SESSION_COOKIE_SECURE=${DJANGO_SESSION_COOKIE_SECURE:-false}
      - DJANGO_CSRF_COOKIE_SECURE=${DJANGO_CSRF_COOKIE_SECURE:-false}
      - SHOW_GITHUB=${SHOW_GITHUB:-false}
      - NO_PROXY=localhost,127.0.0.1,django,chatgpt-mirror,cfbypass
      - no_proxy=localhost,127.0.0.1,django,chatgpt-mirror,cfbypass
      - ADMIN_USERNAME=${ADMIN_USERNAME:-admin}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:?ADMIN_PASSWORD must be set}
      - GATEWAY_ADMIN_SECRET=${GATEWAY_ADMIN_SECRET:?GATEWAY_ADMIN_SECRET must be set}
      - ALLOW_REGISTER=${ALLOW_REGISTER:-false}
      - FREE_ACCOUNT_USERNAME=${FREE_ACCOUNT_USERNAME:-free_account}
      - CHATGPT_GATEWAY_URL=http://chatgpt-mirror:50003
      - HTTP_PROXY=http://host.docker.internal:1081
      - HTTPS_PROXY=http://host.docker.internal:1081
    volumes:
      - ./backend/app:/app/backend/app:ro
      - ./backend/logs:/app/backend/logs
      - ./backend/db:/app/backend/db
    restart: unless-stopped
    networks:
      - chatgpt-network

  cfbypass:
    image: lisa666520/chatgpt-mirror-django:cfbypass
    command: ["uvicorn", "app:app", "--host", "0.0.0.0", "--port", "8000"]
    ports:
      - "127.0.0.1:18001:8000"
    volumes:
      - ./cfbypass/app.py:/app/app.py:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - TZ=Asia/Shanghai
      - CF_BYPASS_PROXY_SERVER=${CHATGPT_OUTBOUND_PROXY-http://host.docker.internal:1081}
    restart: unless-stopped
    networks:
      - chatgpt-network

networks:
  chatgpt-network:
    driver: bridge
